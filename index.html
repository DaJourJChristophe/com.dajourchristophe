  <body>
    <script>

/**
 * @description A Worker is a component associated with a section of UI.
 */
class InterfaceWorker
{
  notify(event_)
  {
    throw new Error('This method is required to be implemented');
  }
};

/**
 * @description A wrapper around the default `click` Event defined by the browser.
 */
class ClickEvent extends Event
{
  constructor()
  {
    super('click');
  }

  execute()
  {
    console.log(this);
  }
};

/**
 * @description A wrapper around the default `load` Event defined by the browser.
 */
class LoadEvent extends Event
{
  constructor()
  {
    super('load');
  }

  execute()
  {
    console.log(this);
  }
};

/**
 * @description A orchestrator dispatchig messages across all workers.
 */
class EventBroker
{
  constructor()
  {
    this.workers = new Array();
  }

  /**
   * @description Enqueue an Event into the Events buffer.
   */
  send(event_)
  {
    this.workers.forEach(worker => worker.notify(event_));
  }

  /**
   * @description Add a Worker to the Workers list.
   */
  subscribe(worker)
  {
    this.workers.push(worker);
  }
};

/**
 * @description Adds a context reference to the worker so it can call the send decorator.
 */
class AbstractWorker extends InterfaceWorker
{
  constructor(context)
  {
    if (context == null)
    {
      throw new Error('context reference must not be null');
    }

    super();

    this.context = context;
  }
};

/**
 * @description The article section of the UI.
 */
class ArticleElement extends AbstractWorker
{
  constructor(context)
  {
    super(context);
  }

  notify(event_)
  {
    event_.execute();
  }
};

 * @description The footer section of the UI.

class InterfaceState
{
  execute()
  {
    throw new Error('execute must be implemented');
  }

}; // class InterfaceState

class SplashState extends InterfaceState
{
  execute()
  {
  }

  static create()
  {
    return new SplashState();
  }

}; // class SplashState

class LandingState extends InterfaceState
{
  execute()
  {
  }

  static create()
  {
    return new LandingState();
  }

}; // class LandingState

class ToggledState extends InterfaceState
{
  execute()
  {
  }

  static create()
  {
    return new ToggledState();
  }

}; // class ToggledState

/**
 * @description A primary orchestrator for the UI.
 */
class Context
{
  constructor()
  {
    this.state = SplashState.create();
    this.eventBroker = new EventBroker();
  }

  send(event_)
  {
    if (event_ == null)
    {
      throw new Error('event must not be null');
    }

    this.eventBroker.send(event_);
  }

  addDependency(dependency)
  {
    if (dependency == null)
    {
      throw new Error('dependency must not be null');
    }

    this.eventBroker.subscribe(dependency);
  }
};

const context = new Context();

const articleElement      = new ArticleElement(context);
const footerElement       = new FooterElement(context);
const leftSidebarElement  = new LeftSidebarElement(context);
const navigationElement   = new NavigationElement(context);
const rightSidebarElement = new RightSidebarElement(context);

context.addDependency(articleElement);
context.addDependency(footerElement);
context.addDependency(leftSidebarElement);
context.addDependency(navigationElement);
context.addDependency(rightSidebarElement);

context.send(new ClickEvent());


    </script>
