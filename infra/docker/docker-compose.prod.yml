services:
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.prod
    container_name: com-dajour-prod
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    image: nginx:1.28-alpine
    container_name: com-dajour-gateway
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
