services:
  app:
    image: com-dajour-app:latest
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    networks:
      - app_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:1.28-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
    networks:
      - app_net
    configs:
      - source: nginx_default_conf
        target: /etc/nginx/conf.d/default.conf
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  app_net:
    driver: overlay

configs:
  nginx_default_conf:
    file: ../nginx/default.conf
