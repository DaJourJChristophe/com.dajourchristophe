name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-minor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Skip existing release commits
        id: release_guard
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$HEAD_COMMIT_MESSAGE" == chore\(release\):\ minor* ]]; then
            echo "mode=tag" >> "$GITHUB_OUTPUT"
          else
            echo "mode=prepare" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.release_guard.outputs.mode == 'prepare'
        run: npm ci

      - name: Remove broken runner apt sources
        if: steps.release_guard.outputs.mode == 'prepare'
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list

      - name: Install Playwright browsers
        if: steps.release_guard.outputs.mode == 'prepare'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Validate release candidate
        if: steps.release_guard.outputs.mode == 'prepare'
        run: npm run ci

      - name: Configure Git identity
        if: steps.release_guard.outputs.mode == 'prepare'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Require release token
        if: steps.release_guard.outputs.mode != 'skip'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "RELEASE_PAT secret is required so release tags can trigger downstream workflows."
            exit 1
          fi

      - name: Bump minor version
        if: steps.release_guard.outputs.mode == 'prepare'
        run: node scripts/bump-version.mjs minor

      - name: Prepare release pull request
        if: steps.release_guard.outputs.mode == 'prepare'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_BRANCH="release/minor-v$VERSION"

          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"
          git add package.json package-lock.json
          git commit -m "chore(release): minor v$VERSION"
          git push origin HEAD:"$RELEASE_BRANCH" --force

          PR_NUMBER="$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "$RELEASE_BRANCH" \
            --base main \
            --json number \
            --jq '.[0].number')"

          if [ -n "$PR_NUMBER" ]; then
            echo "Release PR #$PR_NUMBER already exists for $RELEASE_BRANCH"
          else
            gh pr create \
              --repo "${{ github.repository }}" \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore(release): minor v$VERSION" \
              --body "Automated minor release prepared from main after validation passed."

            PR_NUMBER="$(gh pr list \
              --repo "${{ github.repository }}" \
              --head "$RELEASE_BRANCH" \
              --base main \
              --json number \
              --jq '.[0].number')"
          fi

          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --auto --squash

      - name: Tag merged release commit
        if: steps.release_guard.outputs.mode == 'tag'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
            exit 0
          fi

          git tag "v$VERSION"
          git push origin "v$VERSION"
